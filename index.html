<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Event RSVP & Check-in</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/qrcode@1.5.3/build/qrcode.min.js"></script>
  <style>
    /* toast notifications */
    #toast {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 50;
    }
    .toast {
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      color: #fff;
      margin-bottom: 0.5rem;
      animation: fade 0.3s ease;
    }
    .toast.success { background: #10b981; }
    .toast.error   { background: #ef4444; }
    .toast.info    { background: #3b82f6; }
    @keyframes fade { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-gray-50 text-gray-900">
  <!-- Header -->
  <header class="bg-white shadow">
    <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
      <h1 class="text-2xl font-bold">Event RSVP & Check-in</h1>
      <div class="flex gap-2 text-sm">
        <span id="totalBadge" class="px-3 py-1 rounded-full bg-blue-100 text-blue-700">0 Total</span>
        <span id="checkedBadge" class="px-3 py-1 rounded-full bg-green-100 text-green-700">0 Checked In</span>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-5xl mx-auto px-6 py-6 grid md:grid-cols-2 gap-6">
    <!-- RSVP Form -->
    <section class="bg-white rounded-xl shadow p-6">
      <h2 class="text-xl font-semibold mb-4">RSVP</h2>
      <form id="rsvpForm" class="space-y-4">
        <div class="grid sm:grid-cols-2 gap-4">
          <input required name="firstName" placeholder="First name" class="px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
          <input required name="lastName" placeholder="Last name" class="px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>
        <input required type="email" name="email" placeholder="Email address" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
        <input name="phone" placeholder="Phone (optional)" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
        <input name="company" placeholder="Company (optional)" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
        <textarea name="dietaryRestrictions" placeholder="Dietary restrictions (optional)" rows="2" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
        <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 disabled:opacity-50">Register</button>
      </form>

      <!-- Preview card shown after successful RSVP -->
      <div id="previewCard" class="hidden mt-6 p-4 border rounded-lg bg-gray-50">
        <p class="font-semibold mb-2">You’re registered! Show this QR code at check-in:</p>
        <div class="flex justify-center"><canvas id="qrCanvas"></canvas></div>
      </div>
    </section>

    <!-- Check-in Scanner -->
    <section class="bg-white rounded-xl shadow p-6">
      <h2 class="text-xl font-semibold mb-4">Check-in Scanner</h2>
      <div id="scannerBox" class="border-2 border-dashed border-gray-300 rounded-lg p-6 text-center">
        <p class="text-gray-600">Click “Start Scanner” and allow camera access.</p>
        <button id="startScanner" class="mt-3 px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700">Start Scanner</button>
        <video id="video" class="hidden w-full rounded mt-3"></video>
        <canvas id="canvas" class="hidden"></canvas>
      </div>
      <div id="checkInResult" class="hidden mt-4 p-3 rounded"></div>
    </section>

    <!-- Admin Table -->
    <section class="md:col-span-2 bg-white rounded-xl shadow p-6">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-xl font-semibold">Attendee List</h2>
        <div class="flex gap-2">
          <input id="searchInput" type="text" placeholder="Search…" class="px-3 py-1 border rounded-lg" />
          <button id="exportBtn" class="px-3 py-1 bg-gray-200 rounded-lg hover:bg-gray-300">Export CSV</button>
        </div>
      </div>
      <div class="overflow-x-auto">
        <table class="min-w-full text-sm">
          <thead>
            <tr class="border-b">
              <th class="text-left py-2">Name</th>
              <th class="text-left py-2">Email</th>
              <th class="text-left py-2">Company</th>
              <th class="text-left py-2">RSVP’d</th>
              <th class="text-left py-2">Check-in</th>
              <th class="text-left py-2"></th>
            </tr>
          </thead>
          <tbody id="attendeeTable"></tbody>
        </table>
      </div>
    </section>
  </main>

  <!-- Toast container -->
  <div id="toast"></div>

  <script type="module" src="main.js"></script>
</body>
</html>
